services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.20.15
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
    environment:
      PAPERLESS_REDIS: redis://redis:6379
      PAPERLESS_SECRET_KEY: e2e-test-secret-not-for-production
      PAPERLESS_ADMIN_USER: admin
      PAPERLESS_ADMIN_PASSWORD: admin
      PAPERLESS_TIME_ZONE: UTC
      PAPERLESS_OCR_LANGUAGES: eng
      PAPERLESS_DBENGINE: sqlite
    healthcheck:
      # GET /api/ returns 302 to /api/schema/view/ (Swagger UI, HTML-only) since
      # Paperless 2.16; with -L curl follows the redirect and gets 406 because
      # we ask for JSON. Hit /api/schema/?format=json directly — that's a real
      # "API serves requests" check and stays valid across versions.
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/schema/?format=json"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 60s
