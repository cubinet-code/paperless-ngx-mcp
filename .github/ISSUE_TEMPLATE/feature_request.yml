name: Feature request
description: Suggest a new tool, parameter, or behaviour
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what's awkward to do? Describe the use case, not the solution.
      placeholder: |
        When I ask Claude to …, it has to make N round-trips because …
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? A new tool? A new parameter on an existing one? Different behaviour?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or other approaches you've thought about.

  - type: input
    id: paperless_endpoint
    attributes:
      label: Relevant Paperless-NGX API endpoint
      description: If this maps to a specific Paperless-NGX REST endpoint, link it here.
      placeholder: "https://docs.paperless-ngx.com/api/#…"
