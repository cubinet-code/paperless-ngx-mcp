name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the fields below — the more specific you are, the faster this gets fixed.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What did you do, what did you expect, and what actually happened?
      placeholder: |
        I called `bulk_edit_documents` with method "merge" and …
        Expected: …
        Actual: …
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce. Include the tool name and arguments you used.
      placeholder: |
        1. Configure MCP client with PAPERLESS_URL=… and PAPERLESS_API_KEY=…
        2. Invoke tool `…` with arguments `{ … }`
        3. See error
    validations:
      required: true

  - type: input
    id: mcp_version
    attributes:
      label: paperless-ngx-mcp version
      placeholder: "0.1.2"
    validations:
      required: true

  - type: input
    id: paperless_version
    attributes:
      label: Paperless-NGX version
      placeholder: "2.13.0"
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: MCP client
      description: Which MCP client are you using to invoke the server?
      options:
        - Claude Code (CLI)
        - Claude Desktop
        - Cursor
        - Cline
        - Custom / SDK
        - Other (please describe in Summary)
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - stdio
        - HTTP (Streamable)
        - SSE (legacy)
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: "v24.0.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste any relevant stderr output, stack traces, or HTTP responses. Redact API tokens before pasting.
      render: shell

  - type: checkboxes
    id: prechecks
    attributes:
      label: Pre-flight checks
      options:
        - label: I'm on the latest published version of `paperless-ngx-mcp`
          required: true
        - label: I've redacted any secrets (API tokens, URLs to internal hosts) from the logs above
          required: true
